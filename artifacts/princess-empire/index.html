<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>Princess Empire — Premium African Fashion Store | Clothing, Shoes, Perfumes & More</title>
    <meta name="description" content="Shop the finest African and Nigerian fashion at Princess Empire. Premium clothing, shoes, perfumes, beauty products, bags, lingerie, jewellery and accessories. Free delivery on orders over ₦15,000. Authentic products. 7-day returns." />
    <meta name="keywords" content="African fashion Nigeria, Nigerian clothing online, Ankara dress, African print fashion, buy shoes Nigeria, perfume Nigeria, beauty products Lagos, Nigerian jewellery, Abuja fashion store, Princess Empire shop" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://princessempire.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Princess Empire" />
    <meta property="og:title" content="Princess Empire — Premium African Fashion Store" />
    <meta property="og:description" content="Shop premium African and Nigerian fashion — clothing, shoes, perfumes, beauty products, accessories, bags, lingerie, and jewellery. Free delivery over ₦15,000." />
    <meta property="og:url" content="https://princessempire.com/" />
    <meta property="og:image" content="https://picsum.photos/seed/pe-hero/1200/630" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Princess Empire — Premium African Fashion Store" />
    <meta name="twitter:description" content="Shop premium African and Nigerian fashion — clothing, shoes, perfumes, beauty, accessories, bags, lingerie, and jewellery." />
    <meta name="twitter:image" content="https://picsum.photos/seed/pe-hero/1200/630" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Princess Empire",
      "description": "Premium Nigerian and African fashion store offering clothing, shoes, perfumes, beauty products, accessories, bags, lingerie, and jewellery.",
      "url": "https://princessempire.com",
      "logo": "https://princessempire.com/favicon.svg",
      "currenciesAccepted": "NGN",
      "paymentAccepted": "Cash, Bank Transfer",
      "areaServed": {
        "@type": "Country",
        "name": "Nigeria"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Fashion & Beauty",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Clothing" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Shoes" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Perfumes" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Beauty Products" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Bags" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Jewellery" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Accessories" } },
          { "@type": "Offer", "itemOffered": { "@type": "Product", "name": "Lingerie" } }
        ]
      },
      "sameAs": []
    }
    </script>

    <!-- Structured Data: WebSite with sitelinks search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Princess Empire",
      "url": "https://princessempire.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://princessempire.com/shop?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
