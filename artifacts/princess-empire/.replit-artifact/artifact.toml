kind = "web"
previewPath = "/"
title = "Princess Empire"
version = "1.0.0"
id = "artifacts/princess-empire"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22613

[services.development]
run = "pnpm --filter @workspace/princess-empire run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/princess-empire", "run", "build" ]
publicDir = "artifacts/princess-empire/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22613"
BASE_PATH = "/"
