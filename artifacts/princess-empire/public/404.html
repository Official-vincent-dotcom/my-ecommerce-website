<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Princess Empire</title>
  <script>
    // GitHub Pages SPA workaround:
    // Encodes the full path into a query string and redirects to index.html,
    // which then restores it via the script below (add to index.html if needed).
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host + l.pathname.split('/')[1] +
      '/?p=' + encodeURIComponent(l.pathname + l.search) + l.hash
    );
  </script>
</head>
<body></body>
</html>
